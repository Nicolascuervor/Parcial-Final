version: '3.8'

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ticketfast_test
    tmpfs:
      - /var/lib/postgresql/data

  api-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql+psycopg://test_user:test_password@db-test:5432/ticketfast_test
    command: ["bash", "-c", "uv run python -c 'from src.database.config import Base, engine; Base.metadata.create_all(bind=engine)' && uv run uvicorn src.main:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8001:8000"
    depends_on:
      - db-test
