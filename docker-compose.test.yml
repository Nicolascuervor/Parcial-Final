version: '3.8'

services:
  db-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: ticketfast_test
    tmpfs:
      - /var/lib/postgresql/data

  api-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    environment:
      DATABASE_URL: postgresql://test_user:test_password@db-test:5432/ticketfast_test
    ports:
      - "8001:8000"
    depends_on:
      - db-test
